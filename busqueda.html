<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Resultados de búsqueda de teclados gaming Keyzone con switches mecánicos e iluminación RGB.">
    <meta name="robots" content="index, follow">
    <title>Resultados de búsqueda | Teclados Gaming Keyzone</title>
    <link rel="icon" type="image/svg+xml" href="img/logos/logoKeyZone.svg">

    <link rel="stylesheet" href="css/styles.css">

                <g stroke-width=".26458">
                    <text id="letrasKeyzone" x="43.415443" y="105.98149" fill="#000000" font-size="8.8194px"
                        xml:space="preserve">
                        <tspan x="43.415443" y="105.98149" fill="#ef5d5d" font-family="sans-serif" font-size="8.8194px"
                            font-weight="bold" stroke="#781818" stroke-width=".26458">KeyZone
                        </tspan>
                    </text>

                    <g id="teclado">
                        <rect x="22.225" y="94.721" width="19.018" height="15.486" fill="#f4ccf4" />
                        <g stroke="#be4cba">
                            <rect x="24.602" y="96.555" width="5.9091" height="11.479" fill="#f4ccf4" />

                            <ellipse cx="26.462" cy="103.65" rx=".45626" ry=".43224" fill="#f4ccf4" />
                            <ellipse cx="28.623" cy="103.65" rx=".45626" ry=".43224" fill="#f4ccf4" />

                    </g>

                        <ellipse cx="25.573" cy="105.8" rx=".12007" ry=".56432" />
                        <ellipse cx="26.318" cy="105.8" rx=".12007" ry=".56432" />
                        <ellipse cx="27.086" cy="105.8" rx=".12007" ry=".56432" />
                        <ellipse cx="27.831" cy="105.8" rx=".12007" ry=".56432" />
                        <ellipse cx="28.575" cy="105.8" rx=".12007" ry=".56432" />
                        <ellipse cx="29.368" cy="105.8" rx=".12007" ry=".56432" />
                    </g>

                        <ellipse cx="34.602" cy="105.99" rx=".45626" ry="1.5489" />
                        <rect x="31.241" y="106.8" width="7.036" height=".72041" />
                    </g>
                </g>
            </svg>
        </a>

        <nav class="nav" role="navigation" aria-label="Navegación principal">
            <ul class="flex flex-wrap justify-center gap-4 font-semibold">
                <li><a href="index.html" class="hover:text-[#A8FBD3] focus-visible:outline-[#A8FBD3]">Inicio</a></li>
                <li><a href="busqueda.html" class="hover:text-[#A8FBD3] focus-visible:outline-[#A8FBD3]">Categoría</a>
                </li>
                <li><a href="contacto.html"
                        class="hover:text-[#A8FBD3] inline-flex items-center gap-2 whitespace-nowrap">Contacto</a>
                </li>
            </ul>
        </nav>

        <div class="flex flex-wrap justify-center items-center gap-2 w-full md:w-auto">
            <a href="carrito.html" aria-label="Abrir carrito de compras" class="carrito">
                <img src="img/iconos/carrito.svg" alt="Icono del carrito de compras" class="w-7 h-7">
            </a>
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Cambiar entre modo claro y oscuro"
                aria-pressed="false" title="Cambiar entre modo claro y oscuro">
                <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path fill="currentColor"
                        d="M8 4.75a3.25 3.25 0 1 0 0 6.5a3.25 3.25 0 0 0 0-6.5zm0-4a.5.5 0 0 1 .5.5V2a.5.5 0 0 1-1 0V1.25a.5.5 0 0 1 .5-.5zm0 13.25a.5.5 0 0 1 .5.5V15a.5.5 0 0 1-1 0v-.5a.5.5 0 0 1 .5-.5zm7-7a.5.5 0 0 1-.5.5H14a.5.5 0 0 1 0-1h.5a.5.5 0 0 1 .5.5zm-13 0a.5.5 0 0 1-.5.5H.5a.5.5 0 0 1 0-1H1a.5.5 0 0 1 .5.5zm11.364-4.864a.5.5 0 0 1-.707 0l-.354-.354a.5.5 0 1 1 .707-.707l.354.353a.5.5 0 0 1 0 .708zM3.043 12.157a.5.5 0 0 1-.707 0l-.354-.354a.5.5 0 1 1 .707-.707l.354.353a.5.5 0 0 1 0 .708zm9.9 0a.5.5 0 0 1 0-.708l.354-.353a.5.5 0 1 1 .707.707l-.354.354a.5.5 0 0 1-.707 0zM3.043 3.843a.5.5 0 0 1 0-.708l-.354-.353a.5.5 0 1 1 .707.707l-.354.354a.5.5 0 0 1-.707 0z" />
                </svg>
            </button>

    <section class="px-6 pt-6 pb-2" aria-label="Busqueda de productos">
        <div class="max-w-6xl mx-auto flex justify-center">
            <form class="w-full max-w-xl" role="search" aria-label="Buscar en categoria">
                <label for="busqueda-productos" class="block text-sm font-semibold text-[#31326F] mb-2 text-center md:text-left">
                    Buscar producto
                </label>
                <input id="busqueda-productos" type="search" placeholder="Ejemplo: K728 PRO" aria-label="Buscar productos"
                    class="block w-full rounded-lg px-4 py-3 text-[#102A43] bg-[#F7FAFF] border border-[#7E92B8] shadow-sm placeholder:text-[#5D7193] focus:outline-none focus:ring-2 focus:ring-[#31326F] focus:border-[#31326F]">
            </form>
        </div>
    </section>

    <button id="topBtn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-arrow-up" viewBox="0 0 16 16">
            <path fill-rule="evenodd"
                d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5" />
        </svg>
    </button>

    <main class="busqueda py-10 px-6" role="main">
        <h1 id="titulo-resultados" class="text-center text-[#31326F] font-[Mooli] text-3xl mb-10">Resultados de búsqueda</h1>
        <h2 class="text-center text-[#00796B] font-semibold text-xl mb-10">
            Teclados disponibles
        </h2>

        <div class="max-w-6xl mx-auto my-10 bg-white rounded-xl shadow-md p-5">
            <h2 class="text-[#31326F] font-[Mooli] text-2xl mb-4">Comparador</h2>

            <div class="relative w-full" style="height:340px;">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <div class="resultados flex flex-wrap justify-center gap-6" aria-live="polite">
            <p class="text-gray-600">Cargando productos...</p>
        </div>
    </main>

    <footer class="footer bg-[#31326F] text-white text-center py-8 px-6 text-sm" role="contentinfo"
        aria-label="Pie de página Keyzone">
        <div class="socials flex justify-center gap-6 flex-wrap mb-4">
            <a href="#" class="flex items-center gap-2 hover:text-[#A8FBD3] transition">
                <img src="img/redes/instagram.png" alt="" aria-hidden="true" class="w-5 h-5 invert">Instagram
            </a>
            <a href="#" class="flex items-center gap-2 hover:text-[#A8FBD3] transition">
                <img src="img/redes/tiktok.png" alt="" aria-hidden="true" class="w-5 h-5 invert">TikTok
            </a>
            <a href="#" class="flex items-center gap-2 hover:text-[#A8FBD3] transition">
                <img src="img/redes/facebook.png" alt="" aria-hidden="true" class="w-5 h-5 invert">Facebook
            </a>
        </div>
        <p>Almería, España | contacto@keyzone.com</p>

        <p class="mt-3">

        </p>
