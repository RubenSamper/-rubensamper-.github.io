<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cesta | Keyzone</title>
  <link rel="icon" type="image/svg+xml" href="img/logos/logoKeyZone.svg">


  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Mooli&display=swap"
    rel="stylesheet">
  <script src="js/main.js" defer></script>

</head>

<body class="font-[Montserrat] bg-[var(--bg)] text-[var(--text)]">
  <header role="banner"
    class="flex flex-col md:flex-row justify-between items-center bg-[#31326F] text-white px-6 py-4 shadow-md flex-wrap gap-3">
    <a class="logo" href="index.html" aria-label="Ir a inicio">
      <svg class="logo-svg" width="63.654mm" height="15.486mm" version="1.1" viewBox="22.225 94.721 63.654 15.486"
        xmlns="http://www.w3.org/2000/svg">

        <g stroke-width=".26458">
          <text id="letrasKeyzone" x="43.415443" y="105.98149" fill="#000000" font-size="8.8194px" xml:space="preserve">
            <tspan x="43.415443" y="105.98149" fill="#ef5d5d" font-family="sans-serif" font-size="8.8194px"
              font-weight="bold" stroke="#781818" stroke-width=".26458">KeyZone
            </tspan>
          </text>

          <g id="teclado">
            <rect x="22.225" y="94.721" width="19.018" height="15.486" fill="#f4ccf4" />
            <g stroke="#be4cba">
              <rect x="24.602" y="96.555" width="5.9091" height="11.479" fill="#f4ccf4" />
              <path d="m25.757 98.932h3.6677" fill="#000080" />
              <path d="m25.793 100.15h3.6677" fill="#000080" />
              <ellipse cx="26.462" cy="103.65" rx=".45626" ry=".43224" fill="#f4ccf4" />
              <ellipse cx="28.623" cy="103.65" rx=".45626" ry=".43224" fill="#f4ccf4" />
            </g>
          </g>

          <g id="tecla-pequenia" fill="#000080" stroke="#be4cba">
            <ellipse cx="25.573" cy="105.8" rx=".12007" ry=".56432" />
            <ellipse cx="26.318" cy="105.8" rx=".12007" ry=".56432" />
            <ellipse cx="27.086" cy="105.8" rx=".12007" ry=".56432" />
            <ellipse cx="27.831" cy="105.8" rx=".12007" ry=".56432" />
            <ellipse cx="28.575" cy="105.8" rx=".12007" ry=".56432" />
            <ellipse cx="29.368" cy="105.8" rx=".12007" ry=".56432" />
          </g>

          <g fill="#f4ccf4" stroke="#be4cba">
            <rect id="monitor" x="30.64" y="99.066" width="7.9245" height="5.235" />
            <ellipse cx="34.602" cy="105.99" rx=".45626" ry="1.5489" />
            <rect x="31.241" y="106.8" width="7.036" height=".72041" />
          </g>
        </g>
      </svg>
    </a>

    <nav class="nav" role="navigation" aria-label="Navegación principal">
      <ul class="flex flex-wrap justify-center gap-4 font-semibold">
        <li><a href="index.html" class="hover:text-[#A8FBD3] focus-visible:outline-[#A8FBD3]">Inicio</a></li>
        <li><a href="busqueda.html" class="hover:text-[#A8FBD3] focus-visible:outline-[#A8FBD3]">Categoría</a></li>
        <li><a href="contacto.html"
            class="hover:text-[#A8FBD3] inline-flex items-center gap-2 whitespace-nowrap">Contacto</a></li>
      </ul>
    </nav>

    <div class="flex flex-wrap justify-center items-center gap-2 w-full md:w-auto">
      <a href="carrito.html" aria-label="Abrir carrito de compras" class="carrito">
        <img src="img/iconos/carrito.svg" alt="Icono de carrito de compras" class="w-7 h-7">
      </a>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Cambiar entre modo claro y oscuro"
        aria-pressed="false" title="Cambiar entre modo claro y oscuro">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path fill="currentColor"
            d="M8 4.75a3.25 3.25 0 1 0 0 6.5a3.25 3.25 0 0 0 0-6.5zm0-4a.5.5 0 0 1 .5.5V2a.5.5 0 0 1-1 0V1.25a.5.5 0 0 1 .5-.5zm0 13.25a.5.5 0 0 1 .5.5V15a.5.5 0 0 1-1 0v-.5a.5.5 0 0 1 .5-.5zm7-7a.5.5 0 0 1-.5.5H14a.5.5 0 0 1 0-1h.5a.5.5 0 0 1 .5.5zm-13 0a.5.5 0 0 1-.5.5H.5a.5.5 0 0 1 0-1H1a.5.5 0 0 1 .5.5zm11.364-4.864a.5.5 0 0 1-.707 0l-.354-.354a.5.5 0 1 1 .707-.707l.354.353a.5.5 0 0 1 0 .708zM3.043 12.157a.5.5 0 0 1-.707 0l-.354-.354a.5.5 0 1 1 .707-.707l.354.353a.5.5 0 0 1 0 .708zm9.9 0a.5.5 0 0 1 0-.708l.354-.353a.5.5 0 1 1 .707.707l-.354.354a.5.5 0 0 1-.707 0zM3.043 3.843a.5.5 0 0 1 0-.708l-.354-.353a.5.5 0 1 1 .707.707l-.354.354a.5.5 0 0 1-.707 0z" />
        </svg>
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="font-[Mooli] text-3xl text-[#31326F] mb-8 text-center md:text-left">Tu cesta</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <section class="lg:col-span-2 bg-[var(--gray)] rounded-2xl shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4 text-[#31326F]">Productos</h2>
        <div class="carrito-productos">
          <!-- Los productos se cargarán aquí dinámicamente -->
        </div>
      </section>

      <aside class="bg-white rounded-2xl shadow-md p-6 h-fit">
        <h2 class="text-xl font-semibold mb-4 text-[#31326F]">Resumen</h2>
        <div class="resumen-carrito">
          <!-- El resumen se cargará aquí dinámicamente -->
        </div>

        <button type="button"
          class="mt-6 w-full bg-[#31326F] hover:bg-[#00796B] text-white font-semibold py-3 rounded-xl shadow-md transition"
          aria-label="Pagar">
          Pagar
        </button>

        <p class="text-xs text-gray-500 mt-3">
          Al continuar, aceptas nuestras condiciones de compra.
        </p>
      </aside>
    </div>
  </main>

  <footer class="footer bg-[#31326F] text-white text-center py-8 px-6 text-sm" role="contentinfo"
    aria-label="Pie de página Keyzone">
    <div class="socials flex justify-center gap-6 flex-wrap mb-4">
      <a href="#" class="flex items-center gap-2 hover:text-[#A8FBD3] transition">
        <img src="img/redes/instagram.png" alt="" aria-hidden="true" class="w-5 h-5 invert">
        Instagram
      </a>
      <a href="#" class="flex items-center gap-2 hover:text-[#A8FBD3] transition">
        <img src="img/redes/tiktok.png" alt="" aria-hidden="true" class="w-5 h-5 invert">
        TikTok
      </a>
      <a href="#" class="flex items-center gap-2 hover:text-[#A8FBD3] transition">
        <img src="img/redes/facebook.png" alt="" aria-hidden="true" class="w-5 h-5 invert">
        Facebook
      </a>
    </div>
    <p>Almería, España | contacto@keyzone.com</p>
    <p>© 2025 Keyzone. Todos los derechos reservados.</p>

    <p class="mt-3">
      <a href="contacto.html" class="underline hover:text-[#A8FBD3]">Contacta con nosotros</a>
    </p>
  </footer>
</body>

</html>
